<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>웹 개발</title>
  <style>
    #container {
      width:600px;
      margin:20px auto;
    }

    h1 {
      display: inline-block;
      background-color:#0044aa;
      color:#fff;
    }

    .accent {
      font-weight: bold;
      color:red;
    }
  </style>
</head>
<body>
  <div id="container">
    <h1>HTML</h1>
    <p>
      <span class="accent">하이퍼 텍스트 마크업 언어(Hyper Text Markup Language, HTML)</span> ...
    </p>
    <h1>CSS</h1>
    <p><span class="accent">캐스케이딩 스타일 시트(Cascading Style Sheet)</span> ...</p>
    <h1>JavaScript</h1>
    <p><span class="accent">자바스크립트(JavaScript)</span> ...</p>
  </div>
</body>
</html>
