<style>
  table {
    width: 700px; 
    border-collapse: collapse;
    border: 1px solid darkgray;
    margin: 20px auto;
  }

  caption {
    caption-side: bottom;
    font-size: 2em;
    font-weight: bold;
    padding-top: 15px;
  }

  th, td {
    border: 1px solid darkgray;
    padding: 20px;
    text-align: center;
    font-size: 1.3em;
  }

  thead th {
    background-color: #6bbcc3;
  }

  tbody th {
    background-color: #6bbcc3;
  }

  td {
    background-color: #f2f2f2;
  }

  tbody tr:first-child td:last-child {
    background-image: url("cherry_blossom.jpeg");
    background-size: cover;
    background-position: center;
    color: black;
    font-weight: bold;
  }
</style>
