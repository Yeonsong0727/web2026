<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>실습 2-5</title>
  <style>
    table {
      width: 700px;
      border-collapse: collapse;
      border: 1px solid darkgray;
      margin: 20px auto;
    }

    caption {
      caption-side: bottom;
      font-size: 2em;
      font-weight: bold;
      padding-top: 15px;
    }

    th, td {
      border: 1px solid darkgray;
      padding: 20px;
      font-size: 1.3em;
    }

    /* 첫 번째 열 전체 왼쪽 정렬 ⭐ 핵심 */
    th:first-child {
      text-align: left;
    }

    /* 나머지 숫자 셀 가운데 */
    td {
      text-align: center;
      background-color: #f2f2f2;
    }

th {
  font-weight: bold;
}

td {
  text-align: center;
  background-color: #f2f2f2;
  font-weight: normal;
}

tbody tr:first-child td:last-child {
  background-image: url("cherry_blossom.jpeg");
  background-size: cover;
  background-position: center;
  color: black;
  font-weight: bold;
}
  </style>
</head>
<body>
  <table>
    <caption>2023 국민 독서실태</caption>
    <thead>
      <tr>
        <th>구분</th>
        <th>성인</th>
        <th>독서자</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th>종이책</th>
        <td>6.1권</td>
        <td>11.8권</td>
      </tr>
      <tr>
        <th>전자책</th>
        <td>1.2권</td>
        <td>7.1권</td>
      </tr>
      <tr>
        <th>오디오북</th>
        <td>0.2권</td>
        <td>5.5권</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
