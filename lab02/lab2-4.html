<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>실습 2-4</title>
    <style>
      .box{
        width:300px;
        height:70px;     
        margin:10px auto;
      }

      #style1 {        
        background-color:#444;          
        color:white;      
      }    

      #style2 {
        background: linear-gradient(to right, #ff00cc, #3333ff);
        color:white;      
      }    

      #style3 {
        background: linear-gradient(to right, #4facfe, #00f2fe);
        color:white;      
      }    

      h1 {
        text-align: center;
        line-height: 70px;
        color:white;
        text-shadow: 4px 3px 10px rgba(0,0,0,0.5);
      }
    </style>
  </head>
  <body>
    <div class="box" id="style1">
      <h1>웹 개발 기초</h1>
    </div>
    <div class="box" id="style2">
      <h1>웹 개발 중급</h1>
    </div>
    <div class="box" id="style3">
      <h1>웹 개발 고급</h1>
    </div>
  </body>
</html>
