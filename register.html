<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사용자 등록</title>
</head>
<body>
  <header>
    <h1>사용자 등록 신청서</h1>
  </header>

  <main>
    <form>
      <fieldset>
        <legend>기본 정보 (Essential)</legend>

        <p>
          <label for="userid">아이디:</label><br>
          <input type="text" id="userid" name="userid" placeholder="4~12자 영문숫자" required style="width: 100%; padding: 10px; margin: 5px 0;">
        </p>

        <p>
          <label for="password">비밀번호:</label><br>
          <input type="password" id="password" name="password" required style="width: 100%; padding: 10px; margin: 5px 0;">
        </p>

        <p>
          <label for="email">이메일:</label><br>
          <input type="email" id="email" name="email" required style="width: 100%; padding: 10px; margin: 5px 0;">
        </p>
      </fieldset>

      <fieldset>
        <legend>부가 정보 (Optional)</legend>

        <p>
          <label for="phone">연락처:</label><br>
          <input type="tel" id="phone" name="phone" placeholder="010-1234-5678" pattern="[0-9]{3}-[0-9]{4}-[0-9]{4}" style="width: 100%; padding: 10px; margin: 5px 0;">
        </p>

        <p>관심 분야:</p>
        <input type="checkbox" id="html" name="interest" value="HTML5">
        <label for="html">HTML5</label>

        <input type="checkbox" id="css" name="interest" value="CSS3">
        <label for="css">CSS3</label>

        <input type="checkbox" id="js" name="interest" value="JavaScript">
        <label for="js">JavaScript</label>

        <p>
          <label for="skill">숙련도:</label><br>
          <input type="range" id="skill" name="skill" min="0" max="10" step="1" style="width: 100%; padding: 10px; margin: 5px 0;">
        </p>
      </fieldset>

      <!-- 버튼을 중앙에 배치 -->
      <p style="text-align: center;">
        <input type="submit" value="가입 신청" style="width: 120px; padding: 10px; margin: 10px;">
        <input type="reset" value="초기화" style="width: 120px; padding: 10px; margin: 10px;">
      </p>
    </form>
  </main>

  <footer>
    <a href="index.html">홈으로</a>
    <p>&copy; 2026 Web Programming Course. All rights reserved.</p>
  </footer>
</body>
</html>
